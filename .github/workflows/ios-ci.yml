name: iOS CI Build

# Manual simulator build (no signing). PR quality checks live in ci.yml.
on:
  workflow_dispatch:

jobs:
  ios-build:
    runs-on: macos-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Pods
        run: cd ios && pod install

      - name: Build iOS (Simulator)
        run: |
          cd ios
          xcodebuild \
            -workspace ReactNativeStarter.xcworkspace \
            -scheme ReactNativeStarter \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            -derivedDataPath build \
            build

      - name: Upload Simulator app
        uses: actions/upload-artifact@v4
        with:
          name: ios-simulator-app
          path: ios/build/Build/Products/Debug-iphonesimulator/ReactNativeStarter.app
